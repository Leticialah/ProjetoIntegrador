<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Vídeos por Gestos</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    video {
      width: 90%;
      max-width: 900px;
      margin-top: 20px;
      border-radius: 12px;
      background: black;
    }

    .info {
      margin-top: 15px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>Controle de Vídeos por Gestos</h1>

  <video id="player" controls autoplay>
    <source id="videoSource" src="video1.mp4" type="video/mp4" />
    Seu navegador não suporta vídeo HTML5.
  </video>

  <div class="info" id="info">Gesto atual: aguardando...</div>

  <script>
    const player = document.getElementById("player");
    const source = document.getElementById("videoSource");
    const info = document.getElementById("info");

    const videos = {
      "1": { arquivo: "video1.mp4", gesto: "Direita" },
      "2": { arquivo: "video2.mp4", gesto: "Esquerda" },
      "3": { arquivo: "video3.mp4", gesto: "Cima" },
      "4": { arquivo: "video4.mp4", gesto: "Baixo" },
      "5": { arquivo: "video5.mp4", gesto: "Aproximar" },
      "6": { arquivo: "video6.mp4", gesto: "Afastar" },
      "7": { arquivo: "video7.mp4", gesto: "Horário" },
      "8": { arquivo: "video8.mp4", gesto: "Anti-horário" }
    };

    document.addEventListener("keydown", function(event) {
      const comando = videos[event.key];

      if (comando) {
        source.src = comando.arquivo;
        player.load();
        player.play();
        info.textContent = "Gesto atual: " + comando.gesto + " | Vídeo: " + comando.arquivo;
      }
    });
  </script>
</body>
</html>
